<p style="line-height:2;text-indent:2em;margin-bottom:1em">我日益觉得智力的重要，我是个智力比较充沛的人。而如果克服了不良生活习惯、并从几年间的情感隔离中重新确立主体性，那我将会与世界上最智慧的人们齐平，为这个目标，我应该持续努力。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">相信积累的力量，因为积累的成果总没法瞬时显现，所以我应该形成进步的学习的习惯。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">而为了克服情感隔离的状态，我必然要顶着头痛写好那本《未选择的路》。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">制订一则日程：</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">早起，去游泳；上午看书、写作、学英语。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">中午睡觉，下午去极乐寺、去健身。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">晚间八点之后，和人聊天、出去玩</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">晚11点睡觉；另外家教学乐器另议时间。</p>
