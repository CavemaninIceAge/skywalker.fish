<p style="line-height:2;text-indent:2em;margin-bottom:1em">台安县小雨，无法成行。看了一个教聊天的系列视频，实战两例，效果极其可观。昨晚和我大姨交流，更是从她身上感受到从未在家感受到过的客观与理性色彩。生活其实就应该这样，我有点后悔最早没报中国人民大学了，当初应该早点到北京，利用我大姨把阶次提升上去。远离我家我爸和我奶奶的那种毫无层次全是情感宣泄的沟通。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">我不应该复读，我应该尽快把自己从和家人的低层次内耗中抽离出去，和家里人的这种相处只会毁了我。</p>
