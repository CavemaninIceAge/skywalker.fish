<title>水田</title>
<meta name="date" content="2024-09-10" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">从前某天夜里贱忒忒的去别人老家的镇子里转，就是在听这首小曲儿，那段路26km，是我第一次骑10公里以上的路程。那一段松花江有十公里那么宽广，水田旁偶然的探照灯光可以照亮正上方的云层。云在天上像紫水晶里的白色云母，十分庞大而震撼。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">后来每次听到这首小曲儿，总是有些想穿越现实的愿望。想要步入那个伸高手才能探到的世界，想到那个一度未知如果不加努力将永远未知的世界里去，而不是停留在这里、停留在这里......</p>
</div>
