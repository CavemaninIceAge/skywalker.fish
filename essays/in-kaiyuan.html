<title>在开原</title>
<meta name="date" content="2024-07-03" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">骑车从四平来到开原，吃过晚饭天已经陷入迷蒙。我搁下继续前往铁岭的计划，找一个不太贵的商务旅店住下。进门后一个红色的抱枕上复写着OYOYOYOYO......，让人心悸。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">五月二十一号那天上学没带烟，到四点钟时实在无法忍受。我的钥匙也忘拿了，就带着身份证和钱去学校旁的一家小旅店歇会儿。老板玩起奇怪的文字游戏，我于是麻木地交出了更多的40元，去结灰的阳台上抽烟，然后躺成一个漫长的季节。那天的旅店就像一般街边的小旅店，那天的床上也有一个复写着OYOYOYOYO的红色抱枕。后来我再也不住那样的店，又在抱枕的红色里第一次发现自己晕血。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">"高架桥拆了修了新的隧道，走来走去走不出我的盐仓桥。"</p>
</div>
