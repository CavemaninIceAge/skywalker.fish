<p style="line-height:2;text-indent:2em;margin-bottom:1em">这天我早晨八点起床，与清华招生组、北大招生组、我大姨、我姐以及我大姨的诸位有能力的亲友交流了报考的事情。我姐说的几个核心论点打动了我："大学是为了体验生活"，"如果要出国读研，外国人并不明白我们那些细小的差别"，"北京大学专业政策似乎更友好"。为此，我确定了选择北京大学经济学系。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">人应该为他所相信或热爱之物生活，否则存在没有价值。</p>
