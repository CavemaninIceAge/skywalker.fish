<title>距离高考111天-犯胃病</title>
<meta name="date" content="2025-02-16" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">昨晚就不该吃那个傻逼汉堡，今天五点多起来就恶心，9点多从学校回来，开始断断续续的吐。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">早课还没开始，小孙说要找个历史老师给我补补，最倒反天罡的一集。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">昨天我们传看他的笔记本，在一些豪言壮语的后面还特地圈上了我和李方时的名字。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">到家瘫在床上刷视频，直到看到一则：残运会足球赛，球径直从球员上方飞来——他扔掉拐杖，在空中翻出一记漂亮的倒挂金钩，球射入门，他翻倒落地。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">"丢掉拐杖的那一刻，进不进已经不重要了"</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">忽然坐起来，想说这些，不知所云。</p>
</div>
