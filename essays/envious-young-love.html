<title>羡慕你们中学时代的恋爱</title>
<meta name="date" content="2024-08-12" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">好羡慕你们中学时代的恋爱，<br/>还不需要在乎太多明天、旁人的眼光，所有的技巧、话术还不熟谙，更不知道热情过后的是什么，只是全沐浴在朦胧的情愫里，可以自顾自去揣摩人的心思。<br/>"没见过水田旁边的学校，没见过十四五岁的你"<br/>而且年轻人的身体还好，荷尔蒙分泌旺盛，所有心动、忐忑、欣喜、悲伤都来的分外热烈，还有着大把的时间，可以分分合合、拉拉扯扯。<br/>可我中学时代只是个自卑内向不会说话还不会打理自己的小男生罢了，只能看着你们，想象自己本可以拥有的经历......</p>
</div>
