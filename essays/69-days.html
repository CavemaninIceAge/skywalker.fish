<p style="line-height:2;text-indent:2em;margin-bottom:1em">我于天行的历程与共和国的历程十分相近。究其内核，都是在孤立无援中自强、在自立的基调下更去学习并兼容世界的规则。理解共和国的历程，也是理解我自我觉知以来八年生活的门径。今天复读奋斗的性质其实正如抗日战争：既是一场民族解放战争，更是一场民族民主革命。</p>
