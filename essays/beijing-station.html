<title>永远的北京</title>
<meta name="date" content="2026-05-29" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">走出北京站，无数次无数年这里的回忆层层叠叠，覆盖在这熟习的迎面热风里。这里就像我的家门——我得意地来、失意地来、卷土重来地归来、充满期待地来、安安静静地来来回回。那几栋厚墙高楼永远矗立在上行通道的尽头，车站永远在吞吐着五湖四海的、各怀其志的人。这座都会是永恒的，只有人们起起落落。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">没有人像北京一样。在西周先民带着牲口和孩子走到这里筑城后，北京已经存在了2000多年，从14世纪至今，北京享受了700年的黄金时代，没有人有那样长的黄金时代，哪怕在人一生70年的时间里。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">没有人能买下北京，没有人能一生拥有整座北京。自天子以至于庶人，我们浮浮沉沉，生活在北京里。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">我们浮浮沉沉，我们生活在北京。</p>
</div>
