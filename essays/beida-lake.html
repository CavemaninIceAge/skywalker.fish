<title>没在塘沽看到海，却在北大看见湖</title>
<meta name="date" content="2024-09-03" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">抑郁不平地来到北京，想去塘沽看海，却在北大看到了湖。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">我们绕着湖骑自行车，我说那个地方，好像是"笑完了，又能怎么样呢"的那个地方。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">我们在湖心岛坐着，我喜欢S君的自我秩序感。我们在湖边坐着，S君说人生中活得是那么几句话能描述下的瞬间。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">S君说他喜欢高考前那一个月，可以充分地去为一个目标奋斗。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">北大没有我想的那么好，但是具体地富有高度。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">"不是现实支撑了你的梦想，而是梦想支撑了你的现实"</p>
</div>
