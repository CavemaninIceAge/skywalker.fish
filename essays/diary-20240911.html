<p style="line-height:2;text-indent:2em;margin-bottom:1em">今天是在北师大的第11天。我已经完全忘却了在德强的苦厄生活，两种生活似乎完全同样困顿——只是在德强是没有自由，在北师大是没有未来。<br/>这里真实的痛苦是老师和同学的水平都比我从前周边的环境都差奇多，似乎完全进入了一个像哈某中学那样一个世界。</p>
