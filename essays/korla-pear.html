<title>库尔勒大香梨</title>
<meta name="date" content="2024-08-16" />

<div class="essay-body">
<p style="line-height:2;text-indent:2em;margin-bottom:1em">两天都有些流感，嗓子沙疼，陆陆续续睡了半天，中午发烧了。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">我试着感受这次生病的不同。今天我只是躺在床上，什么也没想。刚又爬起来去水房洗了我中午从食堂顺来的梨，放上我喜欢的音乐，安静地一口一口啃着我青色的库尔勒香梨，感觉日子好像还很惬意。</p>
<p style="line-height:2;text-indent:2em;margin-bottom:1em">或许坚强和冷漠不是真正的成长，温柔和松弛感才是吧</p>
</div>
